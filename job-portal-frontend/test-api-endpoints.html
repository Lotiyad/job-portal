<!DOCTYPE html>
<html>
<head>
    <title>API Endpoint Test</title>
</head>
<body>
    <h1>Testing Job Portal API</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        async function testEndpoint(endpoint, method = 'GET', data = null) {
            try {
                const options = {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json'
                    }
                };
                
                if (data) {
                    options.body = JSON.stringify(data);
                }
                
                const response = await fetch(`https://job-portal-vwac.onrender.com/api${endpoint}`, options);
                
                let result = {
                    endpoint: endpoint,
                    status: response.status,
                    statusText: response.statusText,
                    ok: response.ok
                };
                
                if (response.ok) {
                    result.data = await response.json();
                } else {
                    result.error = await response.text();
                }
                
                return result;
            } catch (error) {
                return {
                    endpoint: endpoint,
                    error: error.message
                };
            }
        }
        
        async function runTests() {
            results.innerHTML = '<h2>Testing API Endpoints...</h2>';
            
            // Test public jobs
            const jobsTest = await testEndpoint('/jobs/public');
            results.innerHTML += `<h3>Public Jobs (${jobsTest.ok ? '✅' : '❌'})</h3><pre>${JSON.stringify(jobsTest, null, 2)}</pre>`;
            
            // Test login endpoint
            const loginTest = await testEndpoint('/auth/login', 'POST', {
                email: 'test@example.com',
                password: 'test123'
            });
            results.innerHTML += `<h3>Login (${loginTest.ok ? '✅' : '❌'})</h3><pre>${JSON.stringify(loginTest, null, 2)}</pre>`;
            
            // Test register endpoint
            const registerTest = await testEndpoint('/auth/register', 'POST', {
                name: 'Test User',
                email: 'test2@example.com',
                password: 'test123',
                role: 'jobseeker'
            });
            results.innerHTML += `<h3>Register (${registerTest.ok ? '✅' : '❌'})</h3><pre>${JSON.stringify(registerTest, null, 2)}</pre>`;
            
            // Test application endpoint (should fail without auth)
            const appTest = await testEndpoint('/applications/apply', 'POST');
            results.innerHTML += `<h3>Application (no auth) (${appTest.ok ? '✅' : '❌'})</h3><pre>${JSON.stringify(appTest, null, 2)}</pre>`;
        }
        
        runTests();
    </script>
</body>
</html>
